# cargo-deny: license + advisory gate (whitepaper §2, §8.9).
[advisories]
version = 2
yanked = "deny"

[licenses]
version = 2
# Memscribe is dual MIT OR Apache-2.0; permit the usual permissive set its
# dependency tree pulls in.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "MPL-2.0",
    "CC0-1.0",
]
confidence-threshold = 0.9

[bans]
multiple-versions = "warn"
wildcards = "allow"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
