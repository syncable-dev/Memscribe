<svg width="480" height="480" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Memscribe">
  <!-- outer ring — matches the Memtrace mark -->
  <circle cx="60" cy="60" r="54" fill="none" stroke="#0A1628" stroke-width="4"/>
  <!-- faint inner family ring (shared with MemDB / MemFleet) -->
  <circle cx="60" cy="60" r="45.5" fill="none" stroke="#00D4B8" stroke-width="1" opacity="0.28" stroke-dasharray="2 6"/>

  <!-- fountain pen -->
  <!-- barrel -->
  <line x1="60" y1="29" x2="60" y2="61" stroke="#00D4B8" stroke-width="13" stroke-linecap="round"/>
  <!-- barrel highlight -->
  <line x1="56.4" y1="33" x2="56.4" y2="57" stroke="#5FE9D6" stroke-width="2.2" stroke-linecap="round" opacity="0.75"/>
  <!-- cap band -->
  <line x1="53.6" y1="38" x2="66.4" y2="38" stroke="#0A1628" stroke-width="3.4"/>
  <!-- clip -->
  <path d="M 64.8 33 L 64.8 45" fill="none" stroke="#0A1628" stroke-width="2" stroke-linecap="round" opacity="0.85"/>
  <!-- nib -->
  <path d="M 52.4 61 L 67.6 61 L 60 90 Z" fill="#00D4B8"/>
  <!-- nib slit -->
  <line x1="60" y1="69" x2="60" y2="86" stroke="#0A1628" stroke-width="2.6" stroke-linecap="round"/>
  <!-- breather hole / navy accent dot -->
  <circle cx="60" cy="69.5" r="2.7" fill="#0A1628"/>

  <!-- written transcript line -->
  <path d="M 41 98 Q 60 93.5 79 98" fill="none" stroke="#00D4B8" stroke-width="3" stroke-linecap="round"/>
  <!-- captured nodes -->
  <circle cx="46" cy="96.4" r="2.7" fill="#0A1628"/>
  <circle cx="60" cy="94.8" r="2.7" fill="#0A1628"/>
  <circle cx="74" cy="96.4" r="2.7" fill="#0A1628"/>
</svg>
